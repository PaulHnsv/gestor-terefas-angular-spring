<div class="page-wrapper">

  <div class="page-header">
    <h2>Status da Aplicação</h2>
  </div>

  <div class="status-grid">

    <!-- Ping -->
    <div class="status-card">
      <div class="status-card-label">Conectividade</div>

      <ng-container *ngIf="ping$ | async as ping; else pingLoading">
        <div class="status-row">
          <span class="s-key">Mensagem</span>
          <span [class]="ping.message === 'pong' ? 's-val s-ok' : 's-val s-err'">
            {{ ping.message }}
          </span>
        </div>
        <div class="status-row">
          <span class="s-key">Timestamp</span>
          <span class="s-val">{{ ping.timestamp }}</span>
        </div>
      </ng-container>

      <ng-template #pingLoading>
        <p class="status-loading">Verificando conectividade...</p>
      </ng-template>
    </div>

    <!-- Versão -->
    <div class="status-card">
      <div class="status-card-label">Versão</div>

      <ng-container *ngIf="versionInfo$ | async as v; else versionLoading">
        <div class="status-row">
          <span class="s-key">Aplicação</span>
          <span class="s-val">{{ v.name }}</span>
        </div>
        <div class="status-row">
          <span class="s-key">Versão</span>
          <span class="s-val">{{ v.version }}</span>
        </div>
        <div class="status-row">
          <span class="s-key">Timestamp</span>
          <span class="s-val">{{ v.timestamp }}</span>
        </div>
      </ng-container>

      <ng-template #versionLoading>
        <p class="status-loading">Carregando informações...</p>
      </ng-template>
    </div>

  </div>

</div>
