<form [formGroup]="form" (ngSubmit)="submit()">
  <ng-container *ngIf="state as vm">

    <div class="form-row-2">
      <!-- Nome -->
      <div class="form-group" style="grid-column: 1 / -1">
        <label for="nome">Nome *</label>
        <input
          id="nome"
          type="text"
          formControlName="nome"
          [disabled]="loading"
          placeholder="Nome do projeto"
        />
        <div class="field-error" *ngIf="nameCtrl.touched && nameCtrl.invalid">
          <span *ngIf="nameCtrl.errors?.['required']">Nome é obrigatório.</span>
          <span *ngIf="nameCtrl.errors?.['minlength']">Mínimo de 2 caracteres.</span>
          <span *ngIf="nameCtrl.errors?.['maxlength']">Máximo de 80 caracteres.</span>
        </div>
        <div class="field-error" *ngIf="state.fieldErrors?.['name']">
          {{ state.fieldErrors?.['name'] }}
        </div>
      </div>

      <!-- Descrição -->
      <div class="form-group" style="grid-column: 1 / -1">
        <label for="descricao">Descrição</label>
        <textarea
          id="descricao"
          rows="3"
          formControlName="descricao"
          [disabled]="loading"
          placeholder="Descrição opcional"
        ></textarea>
        <div class="field-error" *ngIf="state.fieldErrors?.['description']">
          {{ state.fieldErrors?.['description'] }}
        </div>
      </div>
    </div>

    <button type="submit" class="btn btn-primary" [disabled]="state.status === 'loading'">
      {{ state.status === 'loading' ? 'Criando...' : 'Criar projeto' }}
    </button>

    <div class="alert-msg alert-success" *ngIf="state.status === 'success'">
      {{ state.successMessage }}
    </div>

    <div class="alert-msg alert-error" *ngIf="state.status === 'error'">
      {{ state.errorMessage }}
    </div>

  </ng-container>
</form>
