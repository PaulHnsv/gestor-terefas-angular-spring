<!-- Modal para editar projeto -->
<div class="modal-backdrop fade show"></div>

<div class="modal fade show d-block" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Editar Projeto</h5>
        <button type="button" class="btn-close" (click)="close.emit()"></button>
      </div>

      <div class="modal-body">
        <form [formGroup]="editForm">

          <div class="form-group">
            <label for="proj-nome">Nome *</label>
            <input
              id="proj-nome"
              type="text"
              formControlName="nome"
              placeholder="Nome do projeto"
            />
          </div>

          <div class="form-group" style="margin-bottom: 0">
            <label for="proj-desc">Descrição</label>
            <textarea
              id="proj-desc"
              rows="3"
              formControlName="descricao"
              placeholder="Descrição opcional"
            ></textarea>
          </div>

        </form>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" (click)="close.emit()">Cancelar</button>
        <button class="btn btn-primary" (click)="submitEdit()">Salvar alterações</button>
      </div>
    </div>
  </div>
</div>
