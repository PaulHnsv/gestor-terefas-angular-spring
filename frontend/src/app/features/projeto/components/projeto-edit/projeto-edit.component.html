<!-- Modal para editar projeto -->
<div class="modal-backdrop fade show"></div>

<div class="modal fade show d-block" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Editar Projeto</h5>
        <button type="button" class="btn-close" (click)="close.emit()"></button>
      </div>

      <div class="modal-body">
        <form [formGroup]="editForm">

          <div class="form-group">
            <label for="proj-nome">Nome *</label>
            <input
              id="proj-nome"
              type="text"
              formControlName="nome"
              [disabled]="loading"
              placeholder="Nome do projeto"
            />

            <div class="field-error" *ngIf="form.nome.touched && form.nome.invalid">
              <span *ngIf="form.nome.errors?.['required']">Nome é obrigatório.</span>
              <span *ngIf="form.nome.errors?.['minlength']">Mínimo de 2 caracteres.</span>
              <span *ngIf="form.nome.errors?.['maxlength']">Máximo de 80 caracteres.</span>
            </div>
            <div class="field-error" *ngIf="fieldErrors?.['nome']">{{ fieldErrors?.['nome'] }}</div>
          </div>

          <div class="form-group" style="margin-bottom: 0">
            <label for="proj-desc">Descrição</label>
            <textarea
              id="proj-desc"
              rows="3"
              formControlName="descricao"
              [disabled]="loading"
              placeholder="Descrição opcional"
            ></textarea>
          </div>

        </form>
      </div>

      <!-- Erro geral -->
      <div style="padding: 0 24px 12px" *ngIf="state.status === 'error'">
        <div class="alert-msg alert-error">{{ state.errorMessage }}</div>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" (click)="close.emit()" [disabled]="loading">Cancelar</button>
        <button class="btn btn-primary" (click)="submitEdit()" [disabled]="loading">
          {{ loading ? 'Salvando...' : 'Salvar alterações' }}
        </button>
      </div>
    </div>
  </div>
</div>
